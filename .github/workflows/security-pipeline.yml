name: DevSecOps Security Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # -------------------------------------------------------------
  # JOB 1: SAST - Análise Estática de Código com Semgrep
  # -------------------------------------------------------------
  sast_scan:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Executar Semgrep Scan
        run: semgrep scan --config auto --sarif --output=semgrep-results.sarif

      - name: Subir Relatório SARIF para a aba Security do GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif

  # -------------------------------------------------------------
  # JOB 2: SCA - Análise de Dependências com Snyk
  # -------------------------------------------------------------
  sca_scan:
    name: SCA (Snyk Open Source)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar Dependências
        run: npm ci || npm install

      - name: Executar Snyk para checar vulnerabilidades nas libs
        uses: snyk/actions/node@master
        continue-on-error: true # Não quebra o pipeline de primeira, apenas gera os alertas
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # -------------------------------------------------------------
  # JOB 3: DAST - Análise Dinâmica em Runtime com OWASP ZAP
  # -------------------------------------------------------------
  dast_scan:
    name: DAST (OWASP ZAP Baseline Scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Subir a Aplicação Alvo
        run: |
          npm ci || npm install
          npm start &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Executar OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          fail_action: false # Define como true se quiser bloquear a build no CI