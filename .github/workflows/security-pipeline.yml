name: DevSecOps Security Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Permissões necessárias para upload de relatórios SARIF no GitHub Security
permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  # -------------------------------------------------------------
  # JOB 1: SAST - Análise Estática de Código com Semgrep
  # -------------------------------------------------------------
  sast_scan:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Executar Semgrep Scan
        run: semgrep scan --config auto --sarif --output=semgrep-results.sarif

      - name: Subir Relatório SARIF para a aba Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif

  # -------------------------------------------------------------
  # JOB 2: SCA - Análise de Dependências com Snyk
  # -------------------------------------------------------------
  sca_scan:
    name: SCA (Snyk Open Source)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Executar Snyk (Sem necessidade de rodar npm build)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # -------------------------------------------------------------
  # JOB 3: DAST - Análise Dinâmica em Runtime com OWASP ZAP
  # -------------------------------------------------------------
  dast_scan:
    name: DAST (OWASP ZAP Baseline Scan)
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Subir OWASP Juice Shop via Docker Container
        run: |
          docker run -d --name juiceshop -p 3000:3000 bkimminich/juice-shop
          npx wait-on http://localhost:3000 --timeout 120000

      - name: Executar OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          fail_action: false
